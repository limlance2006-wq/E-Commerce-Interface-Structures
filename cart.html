<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>Shopping Cart</h1>
</header>

<main class="cart-container">
    <ul class="cart-list">
        <li class="cart-item">
            <img src="wireless.jpg.webp" alt="Wireless Headphones">
            <div>
                <h3>Wireless Headphones</h3>
                <p>₱300</p>
                <input type="number" min="1" value="1">
            </div>
        </li>
    </ul>

    <section class="summary">
        <h2>Subtotal: ₱300</h2>
        <a href="checkout.html" class="btn">Checkout</a>
    </section>
</main>

</body>
</html>
